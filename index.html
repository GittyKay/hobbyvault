<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HobbyVault — Card Inventory</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
  /* ── Reset & base ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:          #0f1117;
    --surface-1:   #181c27;
    --surface-2:   #1e2233;
    --surface-3:   #252a3a;
    --border:      rgba(255,255,255,0.08);
    --border-strong: rgba(255,255,255,0.14);
    --text:        #e8eaf0;
    --text-muted:  #7a80a0;
    --text-dim:    #4a506a;
    --accent:      #f59e0b;
    --accent-dim:  rgba(245,158,11,0.12);
    --accent-text: #fbbf24;
    --green:       #10b981;
    --green-dim:   rgba(16,185,129,0.12);
    --red:         #ef4444;
    --red-dim:     rgba(239,68,68,0.10);
    --radius:      8px;
    --radius-lg:   12px;
    --mono:        'Courier New', Courier, monospace;
    --sans:        -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --sidebar-w:   210px;
  }
  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }

  /* ── Layout ── */
  .app { display: flex; flex-direction: column; height: 100vh; }
  .topbar {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 16px;
    background: var(--surface-1);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0; flex-wrap: wrap; gap: 8px;
  }
  .topbar-title { font-size: 15px; font-weight: 600; color: var(--accent); white-space: nowrap; margin-right: 4px; }
  .topbar-right { display: flex; gap: 8px; margin-left: auto; flex-wrap: wrap; align-items: center; }
  .main { display: flex; flex: 1; overflow: hidden; }
  .sidebar {
    width: var(--sidebar-w); min-width: var(--sidebar-w);
    border-right: 1px solid var(--border);
    padding: 8px 0;
    background: var(--surface-1);
    overflow-y: auto; flex-shrink: 0;
  }
  .content { flex: 1; overflow-y: auto; padding: 18px; min-width: 0; }

  /* ── Sidebar nav ── */
  .nav-section {
    padding: 12px 14px 4px;
    font-size: 10px; font-weight: 600;
    color: var(--text-dim);
    letter-spacing: .08em; text-transform: uppercase;
  }
  .nav-item {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 14px; cursor: pointer;
    color: var(--text-muted); font-size: 13px;
    border-left: 2px solid transparent;
    transition: background .1s, color .1s; user-select: none;
  }
  .nav-item:hover { background: var(--surface-2); color: var(--text); }
  .nav-item.active { background: var(--accent-dim); color: var(--accent-text); border-left: 2px solid var(--accent); }
  .nav-item .ti { font-size: 14px; flex-shrink: 0; }
  .nav-item-label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
  .nav-count {
    margin-left: auto; font-size: 10px; flex-shrink: 0;
    background: var(--surface-3); border: 1px solid var(--border);
    border-radius: 10px; padding: 1px 6px; color: var(--text-muted);
    font-family: var(--mono);
  }
  .nav-sub { padding-left: 28px; font-size: 12px; }

  /* ── Buttons ── */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 13px; border-radius: var(--radius);
    border: 1px solid var(--border-strong);
    background: transparent; color: var(--text);
    cursor: pointer; font-size: 13px; font-family: var(--sans);
    white-space: nowrap; transition: background .12s, border-color .12s;
    line-height: 1;
  }
  .btn:hover { background: var(--surface-3); border-color: var(--accent); }
  .btn:active { opacity: .85; }
  .btn.primary { background: var(--accent); color: #111; border-color: var(--accent); font-weight: 600; }
  .btn.primary:hover { background: #fbbf24; border-color: #fbbf24; }
  .btn.danger { background: var(--red-dim); color: var(--red); border-color: var(--red); }
  .btn.danger:hover { background: rgba(239,68,68,.2); }
  .btn.sm { padding: 4px 9px; font-size: 12px; }
  .btn.icon { padding: 5px 7px; }
  .btn:disabled { opacity: .38; cursor: not-allowed; pointer-events: none; }
  .btn .ti { font-size: 14px; }

  /* ── Form inputs ── */
  input, select, textarea {
    font-family: var(--sans); font-size: 13px;
    color: var(--text); background: var(--surface-3);
    border: 1px solid var(--border-strong);
    border-radius: var(--radius);
    padding: 7px 10px; outline: none;
    transition: border-color .12s;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  input::placeholder { color: var(--text-dim); }
  select option { background: var(--surface-3); }

  /* ── Cards grid ── */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(185px, 1fr));
    gap: 12px;
  }

  /* ── Card tile ── */
  .card-tile {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden; cursor: default;
    transition: border-color .15s, box-shadow .15s;
  }
  .card-tile:hover { border-color: var(--border-strong); }
  .card-tile.in-cart { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
  .card-stripe { height: 5px; }
  .card-body { padding: 10px 12px 12px; }
  .card-name { font-size: 13px; font-weight: 600; line-height: 1.3; margin-bottom: 3px; }
  .card-set { font-size: 11px; color: var(--text-muted); margin-bottom: 7px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .card-badges { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 8px; }
  .badge {
    display: inline-block; font-size: 10px; padding: 2px 6px;
    border-radius: 10px; font-weight: 600; white-space: nowrap;
    border: 1px solid transparent;
  }
  .card-bottom { border-top: 1px solid var(--border); padding-top: 8px; margin-top: 4px; }
  .card-price-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 7px; }
  .card-price { font-size: 15px; font-weight: 700; font-family: var(--mono); color: var(--accent-text); }
  .card-price.no-price { font-size: 12px; color: var(--text-dim); font-family: var(--sans); font-weight: 400; }
  .card-price.loading { font-size: 11px; color: var(--text-muted); font-family: var(--sans); font-weight: 400; }
  .qty-row { display: flex; align-items: center; gap: 6px; }
  .qty-btn {
    width: 22px; height: 22px; border-radius: 6px;
    border: 1px solid var(--border-strong); background: transparent;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 15px; color: var(--text-muted); line-height: 1;
    transition: background .1s, color .1s; font-family: var(--sans);
  }
  .qty-btn:hover { background: var(--surface-3); color: var(--text); }
  .qty-val { font-size: 13px; font-weight: 700; min-width: 22px; text-align: center; font-family: var(--mono); }
  .qty-label { font-size: 11px; color: var(--text-dim); flex: 1; }
  .card-actions { display: flex; gap: 4px; }
  .card-action-row { display: flex; align-items: center; justify-content: space-between; margin-top: 6px; }

  /* ── Game stripe / badge colors ── */
  .stripe-pokemon   { background: linear-gradient(90deg,#e8a000,#f5c842); }
  .stripe-yugioh    { background: linear-gradient(90deg,#6c3fc0,#a78bfa); }
  .stripe-mtg       { background: linear-gradient(90deg,#166534,#4ade80); }
  .stripe-lorcana   { background: linear-gradient(90deg,#c2410c,#fb923c); }
  .stripe-onepiece  { background: linear-gradient(90deg,#b91c1c,#f87171); }
  .stripe-other     { background: linear-gradient(90deg,#374151,#9ca3af); }

  .badge-pokemon  { background: rgba(232,160,0,.15);  color: #f5c842; border-color: rgba(232,160,0,.3); }
  .badge-yugioh   { background: rgba(108,63,192,.2);  color: #c4b5fd; border-color: rgba(108,63,192,.4); }
  .badge-mtg      { background: rgba(22,101,52,.2);   color: #4ade80; border-color: rgba(22,101,52,.4); }
  .badge-lorcana  { background: rgba(194,65,12,.2);   color: #fb923c; border-color: rgba(194,65,12,.4); }
  .badge-onepiece { background: rgba(185,28,28,.2);   color: #f87171; border-color: rgba(185,28,28,.4); }
  .badge-other    { background: rgba(75,85,99,.2);    color: #9ca3af; border-color: rgba(75,85,99,.3); }

  .badge-cond { background: var(--surface-3); color: var(--text-muted); border-color: var(--border); }
  .badge-num  { background: transparent; color: var(--text-dim); border-color: transparent; font-family: var(--mono); font-size: 10px; }

  /* ── Section heading ── */
  .section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .section-title { font-size: 16px; font-weight: 600; }
  .section-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

  /* ── Empty state ── */
  .empty { text-align: center; padding: 56px 24px; color: var(--text-dim); }
  .empty .ti { font-size: 40px; display: block; margin-bottom: 14px; color: var(--text-dim); }
  .empty p { font-size: 14px; color: var(--text-muted); }
  .empty .btn { margin-top: 16px; }

  /* ── Overlay / Modal ── */
  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.65);
    display: flex; align-items: center; justify-content: center;
    z-index: 200;
  }
  .modal {
    background: var(--surface-2); border: 1px solid var(--border-strong);
    border-radius: var(--radius-lg); padding: 22px; width: 360px;
    max-height: 88vh; overflow-y: auto;
  }
  .modal-title { font-size: 15px; font-weight: 600; margin-bottom: 18px; }
  .form-row { display: flex; flex-direction: column; gap: 5px; margin-bottom: 13px; }
  .form-row label { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .04em; }
  .form-row input, .form-row select { width: 100%; }
  .form-row-split { display: flex; gap: 10px; }
  .form-row-split .form-row { flex: 1; }
  .form-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px; padding-top: 14px; border-top: 1px solid var(--border); }

  /* ── Order history ── */
  .orders-list { display: flex; flex-direction: column; gap: 14px; }
  .order-card { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 14px 16px; }
  .order-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .order-id { font-size: 12px; font-family: var(--mono); color: var(--text-muted); }
  .order-date { font-size: 12px; color: var(--text-dim); }
  .order-items { display: flex; flex-direction: column; gap: 6px; }
  .order-row { display: flex; align-items: center; gap: 10px; padding: 8px 10px; background: var(--surface-3); border-radius: var(--radius); }
  .order-name { font-size: 13px; font-weight: 600; flex: 1; }
  .order-meta { font-size: 11px; color: var(--text-muted); }
  .order-qty { font-size: 12px; color: var(--text-muted); }
  .order-line-price { font-family: var(--mono); font-size: 13px; font-weight: 600; min-width: 60px; text-align: right; }
  .order-total-row { display: flex; justify-content: flex-end; align-items: center; gap: 12px; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
  .order-total-label { font-size: 12px; color: var(--text-muted); }
  .order-total-val { font-size: 18px; font-weight: 700; font-family: var(--mono); color: var(--green); }

  /* ── Checkout modal ── */
  .checkout-row { display: flex; align-items: center; gap: 8px; padding: 9px 10px; background: var(--surface-3); border-radius: var(--radius); margin-bottom: 6px; }
  .checkout-name { flex: 1; font-size: 13px; font-weight: 600; }
  .checkout-set { font-size: 11px; color: var(--text-muted); }
  .checkout-qty-ctrl { display: flex; align-items: center; gap: 4px; }
  .checkout-price { font-family: var(--mono); font-size: 13px; font-weight: 600; min-width: 52px; text-align: right; }
  .checkout-total { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
  .checkout-total-label { font-size: 13px; color: var(--text-muted); }
  .checkout-total-val { font-size: 20px; font-weight: 700; font-family: var(--mono); color: var(--green); }
  .checkout-note { font-size: 11px; color: var(--text-dim); margin-top: 8px; text-align: center; }

  /* ── Stats ── */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 22px; }
  .stat-card { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius); padding: 13px 15px; }
  .stat-label { font-size: 10px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 5px; }
  .stat-val { font-size: 22px; font-weight: 700; font-family: var(--mono); }
  .stat-val.green { color: var(--green); }
  .stat-val.amber { color: var(--accent-text); }

  .game-stat-row { display: flex; align-items: center; gap: 12px; padding: 10px 14px; background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 8px; }
  .game-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .game-stat-name { flex: 1; font-size: 13px; font-weight: 500; }
  .game-stat-qty { font-size: 12px; color: var(--text-muted); font-family: var(--mono); }
  .game-stat-val { font-size: 13px; font-weight: 600; font-family: var(--mono); color: var(--accent-text); }

  /* ── Search highlight ── */
  mark { background: rgba(245,158,11,.25); color: var(--accent-text); border-radius: 2px; padding: 0 2px; }

  /* ── Divider ── */
  .divider { height: 1px; background: var(--border); margin: 6px 0; }

  /* ── Filters ── */
  .filters { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 16px; }
  .filter-label { font-size: 11px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: .04em; }

  /* ── Price timestamp ── */
  .price-ts { font-size: 10px; color: var(--text-dim); margin-top: 1px; }

  /* ── Notification toast ── */
  .toast {
    position: fixed; bottom: 20px; right: 20px; z-index: 999;
    background: var(--surface-3); border: 1px solid var(--border-strong);
    border-radius: var(--radius); padding: 10px 16px;
    font-size: 13px; color: var(--text);
    animation: fadeInUp .2s ease;
  }
  @keyframes fadeInUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }
</style>
</head>
<body>
<div id="root"></div>
<script>
const {useState, useEffect, useCallback, useRef, useMemo} = React;

// ═══════════════════════════════════════════════════════════
//  STORAGE  — localStorage keeps data permanently in your
//  browser until you manually clear it. No server needed.
//  Your inventory, orders, and prices all save here.
// ═══════════════════════════════════════════════════════════
const INV_KEY    = 'hv_inventory_v1';
const ORDERS_KEY = 'hv_orders_v1';

function persist(key, data) {
  try { localStorage.setItem(key, JSON.stringify(data)); } catch(e) {}
}
function recall(key, fallback) {
  try {
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : fallback;
  } catch(e) { return fallback; }
}

// ═══════════════════════════════════════════════════════════
//  SEED DATA  — shown on first launch only
// ═══════════════════════════════════════════════════════════
const SEED_INVENTORY = [
  {id:'c1', name:'Charizard ex',           game:'Pokémon',              set:'Scarlet & Violet 151',   number:'006/165', condition:'NM', qty:2,  price:null, priceTs:0},
  {id:'c2', name:'Pikachu',                game:'Pokémon',              set:'Scarlet & Violet 151',   number:'025/165', condition:'NM', qty:5,  price:null, priceTs:0},
  {id:'c3', name:'Mewtwo ex',              game:'Pokémon',              set:'Scarlet & Violet 151',   number:'125/165', condition:'LP', qty:1,  price:null, priceTs:0},
  {id:'c4', name:'Eevee',                  game:'Pokémon',              set:'Prismatic Evolutions',   number:'019/131', condition:'NM', qty:8,  price:null, priceTs:0},
  {id:'c5', name:'Dark Magician',          game:'Yu-Gi-Oh!',            set:'Blazing Dominion',       number:'BLAR-EN000', condition:'NM', qty:3, price:null, priceTs:0},
  {id:'c6', name:'Blue-Eyes White Dragon', game:'Yu-Gi-Oh!',            set:'Blazing Dominion',       number:'BLCR-EN050', condition:'NM', qty:2, price:null, priceTs:0},
  {id:'c7', name:'Lightning Bolt',         game:'Magic: The Gathering', set:'Revised Edition',        number:'171',     condition:'HP', qty:4,  price:null, priceTs:0},
  {id:'c8', name:'Black Lotus',            game:'Magic: The Gathering', set:'Beta',                   number:'232',     condition:'LP', qty:1,  price:null, priceTs:0},
  {id:'c9', name:'Elsa — Spirit of Winter',game:'Lorcana',              set:'The First Chapter',      number:'038/204', condition:'NM', qty:6,  price:null, priceTs:0},
  {id:'c10',name:'Monkey D. Luffy',        game:'One Piece',            set:'Romance Dawn',           number:'OP01-001',condition:'NM', qty:3,  price:null, priceTs:0},
];

// ═══════════════════════════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════════════════════════
const GAMES      = ['Pokémon','Yu-Gi-Oh!','Magic: The Gathering','Lorcana','One Piece','Other'];
const CONDITIONS = ['NM','LP','MP','HP','DMG'];

const GAME_KEY = {
  'Pokémon':'pokemon','Yu-Gi-Oh!':'yugioh',
  'Magic: The Gathering':'mtg','Lorcana':'lorcana',
  'One Piece':'onepiece','Other':'other'
};
const GAME_DOT = {
  'Pokémon':'#f5c842','Yu-Gi-Oh!':'#a78bfa',
  'Magic: The Gathering':'#4ade80','Lorcana':'#fb923c',
  'One Piece':'#f87171','Other':'#9ca3af'
};

function uid() { return 'c'+(Date.now()+Math.random()).toString(36).replace('.',''); }

// ═══════════════════════════════════════════════════════════
//  PRICE FETCH  — uses tcgapi.dev (free, 100 req/day)
//  Requires your free API key from tcgapi.dev/signup
//  Works from any browser — no Anthropic auth needed.
// ═══════════════════════════════════════════════════════════

// Maps HobbyVault game names to tcgapi.dev game slugs
const GAME_SLUG = {
  'Pokémon':              'pokemon',
  'Yu-Gi-Oh!':            'yugioh',
  'Magic: The Gathering': 'magic',
  'Lorcana':              'lorcana',
  'One Piece':            'one-piece',
  'Other':                null
};

async function fetchCardPrice(card, apiKey) {
  if (!apiKey || !apiKey.trim()) {
    throw new Error('NO_API_KEY');
  }
  const game = GAME_SLUG[card.game];
  // Build search query: card name + set for precision
  const q = encodeURIComponent(card.name + ' ' + card.set);
  const gameParam = game ? '&game=' + game : '';
  const url = 'https://api.tcgapi.dev/v1/search?q=' + q + gameParam + '&limit=5';

  const res = await fetch(url, {
    headers: { 'X-API-Key': apiKey.trim() }
  });

  if (res.status === 401) throw new Error('INVALID_KEY');
  if (res.status === 429) throw new Error('RATE_LIMITED');
  if (res.status === 402) throw new Error('QUOTA_EXCEEDED');
  if (!res.ok) throw new Error('HTTP_' + res.status);

  const data = await res.json();
  if (!data.data || data.data.length === 0) return null;

  // Find best match: prefer exact card number match, then name match
  const results = data.data;
  const numMatch = card.number
    ? results.find(r => (r.number||'').toLowerCase() === card.number.toLowerCase())
    : null;
  const best = numMatch || results[0];

  return typeof best.price === 'number' ? best.price : null;
}

// ═══════════════════════════════════════════════════════════
//  ROOT APP
// ═══════════════════════════════════════════════════════════
function App() {
  const [inv, _setInv]    = useState(() => recall(INV_KEY, SEED_INVENTORY));
  const [orders, _setOrders] = useState(() => recall(ORDERS_KEY, []));
  const [view, setView]   = useState('inventory');
  const [gameFilter, setGameFilter] = useState('All');
  const [setFilter, setSetFilter]   = useState('All');
  const [search, setSearch]         = useState('');
  const [cart, setCart]             = useState([]);
  const [modal, setModal]           = useState(null); // 'add'|'edit'|'checkout'
  const [editTarget, setEditTarget] = useState(null);
  const [loadingPrices, setLoadingPrices] = useState({});
  const [toast, setToast] = useState(null);
  const toastTimer = useRef(null);

  const [form, setForm] = useState({
    name:'', game:'Pokémon', set:'', number:'', condition:'NM', qty:1
  });
  const [apiKey, setApiKey] = useState(() => localStorage.getItem('hv_tcgapi_key') || '');
  const [showKeyModal, setShowKeyModal] = useState(false);

  function saveApiKey(k) {
    const trimmed = k.trim();
    setApiKey(trimmed);
    if (trimmed) localStorage.setItem('hv_tcgapi_key', trimmed);
    else localStorage.removeItem('hv_tcgapi_key');
    setShowKeyModal(false);
    showToast(trimmed ? 'API key saved. You can now fetch prices.' : 'API key cleared.');
  }

  // Wrappers that also persist to localStorage
  function setInv(fn) {
    _setInv(prev => {
      const next = typeof fn === 'function' ? fn(prev) : fn;
      persist(INV_KEY, next);
      return next;
    });
  }
  function setOrders(fn) {
    _setOrders(prev => {
      const next = typeof fn === 'function' ? fn(prev) : fn;
      persist(ORDERS_KEY, next);
      return next;
    });
  }

  function showToast(msg) {
    setToast(msg);
    clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(() => setToast(null), 3000);
  }

  // ── Export: saves inventory + orders as a .json backup file ──
  function exportData() {
    const payload = {
      exportedAt: new Date().toISOString(),
      version: 1,
      inventory: inv,
      orders: orders
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], {type: 'application/json'});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = `hobbyvault-backup-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('Backup saved.');
  }

  // ── Import: reads a previously exported .json and restores it ──
  const importRef = useRef(null);
  function importData(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = evt => {
      try {
        const data = JSON.parse(evt.target.result);
        if (!data.inventory || !Array.isArray(data.inventory)) {
          showToast('Invalid backup file — inventory missing.'); return;
        }
        if (window.confirm(
          'Import ' + data.inventory.length + ' cards and ' + (data.orders||[]).length + ' orders?\n\nThis will REPLACE your current data. Make sure you have a backup first.'
        )) {
          setInv(data.inventory);
          setOrders(data.orders || []);
          setCart([]);
          showToast('Imported ' + data.inventory.length + ' cards, ' + (data.orders||[]).length + ' orders.');
        }
      } catch(err) {
        showToast('Could not read file. Make sure it is a HobbyVault backup (.json).');
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  }

  // ── Derived data ──
  const allSets = useMemo(() => {
    const base = gameFilter === 'All' ? inv : inv.filter(c => c.game === gameFilter);
    return ['All', ...new Set(base.map(c => c.set))];
  }, [inv, gameFilter]);

  const filtered = useMemo(() => {
    let r = inv;
    if (gameFilter !== 'All') r = r.filter(c => c.game === gameFilter);
    if (setFilter  !== 'All') r = r.filter(c => c.set  === setFilter);
    if (search.trim()) {
      const q = search.toLowerCase();
      r = r.filter(c =>
        c.name.toLowerCase().includes(q) ||
        c.set.toLowerCase().includes(q)  ||
        (c.number||'').toLowerCase().includes(q)
      );
    }
    return r;
  }, [inv, gameFilter, setFilter, search]);

  const gameGroups = useMemo(() => {
    const g = {};
    inv.forEach(c => {
      if (!g[c.game]) g[c.game] = { total: 0, sets: {} };
      g[c.game].total += c.qty;
      g[c.game].sets[c.set] = (g[c.game].sets[c.set] || 0) + c.qty;
    });
    return g;
  }, [inv]);

  const totalCards     = inv.reduce((s,c) => s + c.qty, 0);
  const portfolioValue = inv.reduce((s,c) => s + (c.price||0)*c.qty, 0);
  const totalSales     = orders.reduce((s,o) => s + o.total, 0);
  const cartCount      = cart.reduce((s,i) => s + i.qty, 0);
  const cartTotal      = cart.reduce((s,i) => {
    const card = inv.find(c => c.id === i.cardId);
    return s + (card?.price||0) * i.qty;
  }, 0);

  // ── Price fetching ──
  async function refreshPrice(card, e) {
    if (e) e.stopPropagation();
    if (!apiKey) { setShowKeyModal(true); return; }
    setLoadingPrices(p => ({...p, [card.id]: true}));
    try {
      const price = await fetchCardPrice(card, apiKey);
      if (price !== null) {
        setInv(prev => prev.map(c => c.id === card.id
          ? {...c, price, priceTs: Date.now()} : c));
        showToast(card.name + ' — $' + price.toFixed(2));
      } else {
        showToast('No price found — check card name and set spelling.');
      }
    } catch(err) {
      const code = err && err.message ? err.message : '';
      if (code === 'NO_API_KEY')       { setShowKeyModal(true); }
      else if (code === 'INVALID_KEY') { showToast('Invalid API key — click the key icon to update it.'); setShowKeyModal(true); }
      else if (code === 'RATE_LIMITED'){ showToast('Rate limited (100/day free). Wait or upgrade at tcgapi.dev.'); }
      else if (code === 'QUOTA_EXCEEDED'){showToast('Daily quota reached. Resets at midnight UTC.');}
      else if (code.startsWith('HTTP_')){ showToast('Server error (' + code + '). Try again shortly.'); }
      else if (code.includes('fetch') || code.includes('Failed') || code.includes('network')) {
        showToast('No internet connection — check your network and retry.');
      } else {
        showToast('Price fetch failed: ' + (code.slice(0,80) || 'unknown error'));
      }
    }
    setLoadingPrices(p => ({...p, [card.id]: false}));
  }

  async function refreshAllVisible() {
    const unpriced = filtered.filter(c => c.price === null && !loadingPrices[c.id]);
    if (!unpriced.length) { showToast('All visible cards already priced.'); return; }
    showToast(`Fetching ${unpriced.length} price${unpriced.length>1?'s':''}…`);
    for (const card of unpriced) await refreshPrice(card);
    showToast('Prices updated.');
  }

  // ── Quantity ──
  function adjustQty(id, delta) {
    setInv(prev => prev.map(c => c.id === id
      ? {...c, qty: Math.max(0, c.qty + delta)} : c));
  }

  // ── Cart ──
  function cartAdd(card) {
    const inCart = cart.find(i => i.cardId === card.id);
    const reserved = inCart?.qty || 0;
    if (card.qty - reserved < 1) { showToast('No more stock available.'); return; }
    setCart(prev => {
      const ex = prev.find(i => i.cardId === card.id);
      if (ex) return prev.map(i => i.cardId === card.id ? {...i, qty: i.qty+1} : i);
      return [...prev, {cardId: card.id, qty: 1}];
    });
    showToast(`${card.name} added to order.`);
  }
  function cartRemove(cardId)  { setCart(prev => prev.filter(i => i.cardId !== cardId)); }
  function cartAdjust(cardId, delta) {
    setCart(prev => prev.map(i => {
      if (i.cardId !== cardId) return i;
      const card = inv.find(c => c.id === cardId);
      const nq = Math.max(0, Math.min(i.qty + delta, card?.qty || 999));
      return {...i, qty: nq};
    }).filter(i => i.qty > 0));
  }

  // ── Checkout ──
  function checkout() {
    const items = cart.map(i => {
      const card = inv.find(c => c.id === i.cardId);
      return {
        cardId: i.cardId,
        name: card?.name || '',
        set: card?.set  || '',
        game: card?.game || '',
        qty: i.qty,
        price: card?.price || 0
      };
    });
    const total = items.reduce((s,i) => s + i.price * i.qty, 0);
    const order = {
      id: 'ORD-' + Date.now().toString(36).toUpperCase(),
      date: new Date().toISOString(),
      items, total
    };
    setOrders(prev => [order, ...prev]);
    setInv(prev => prev.map(c => {
      const item = cart.find(i => i.cardId === c.id);
      return item ? {...c, qty: Math.max(0, c.qty - item.qty)} : c;
    }));
    setCart([]);
    setModal(null);
    setView('orders');
    showToast(`Order ${order.id} completed — $${total.toFixed(2)}`);
  }

  // ── Add / Edit card ──
  function openAdd() {
    setForm({name:'', game:'Pokémon', set:'', number:'', condition:'NM', qty:1});
    setEditTarget(null);
    setModal('add');
  }
  function openEdit(card, e) {
    e.stopPropagation();
    setForm({...card});
    setEditTarget(card);
    setModal('edit');
  }
  function deleteCard(id, e) {
    e.stopPropagation();
    setInv(prev => prev.filter(c => c.id !== id));
    setCart(prev => prev.filter(i => i.cardId !== id));
    showToast('Card removed.');
  }
  function saveCard() {
    if (!form.name.trim() || !form.set.trim()) return;
    if (editTarget) {
      setInv(prev => prev.map(c => c.id === editTarget.id
        ? {...c, ...form, qty: Number(form.qty)} : c));
    } else {
      setInv(prev => [...prev, {
        ...form, id: uid(), qty: Number(form.qty), price: null, priceTs: 0
      }]);
    }
    setModal(null);
    showToast(editTarget ? 'Card updated.' : 'Card added.');
  }

  function fset(k) { return e => setForm(p => ({...p, [k]: e.target.value})); }

  // ── Highlight search matches ──
  function hl(text) {
    if (!search.trim()) return text;
    const parts = String(text).split(new RegExp(`(${search.trim().replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi'));
    return parts.map((p, i) =>
      p.toLowerCase() === search.toLowerCase()
        ? React.createElement('mark', {key:i}, p) : p
    );
  }

  // ── Nav helpers ──
  function navClick(v, gf='All', sf='All') {
    setView(v); setGameFilter(gf); setSetFilter(sf);
  }

  // ═══════════════════════════════════════════════════════
  //  RENDER
  // ═══════════════════════════════════════════════════════
  return React.createElement('div', {className:'app'},

    // Top bar
    React.createElement('div', {className:'topbar'},
      React.createElement('span', {className:'topbar-title'}, '♦ HobbyVault'),
      React.createElement('input', {
        type:'text', placeholder:'Search cards, sets, numbers…',
        value:search, onChange:e=>setSearch(e.target.value),
        style:{width:210}
      }),
      React.createElement('div', {className:'topbar-right'},
        React.createElement('button', {className:'btn sm', onClick:openAdd},
          React.createElement('i',{className:'ti ti-plus'}), 'Add card'),
        React.createElement('button', {className:'btn sm', onClick:refreshAllVisible},
          React.createElement('i',{className:'ti ti-refresh'}), 'Refresh prices'),
        React.createElement('button', {
          className:'btn sm' + (apiKey ? '' : ' danger'),
          onClick:()=>setShowKeyModal(true),
          title: apiKey ? 'API key configured — click to change' : 'No API key set — click to add one'
        },
          React.createElement('i',{className:'ti ti-key'}),
          apiKey ? 'API key ✓' : 'Set API key'
        ),
        React.createElement('button', {className:'btn sm', onClick:exportData, title:'Download a backup of all your inventory and orders as a .json file'},
          React.createElement('i',{className:'ti ti-download'}), 'Export'),
        React.createElement('button', {className:'btn sm', onClick:()=>importRef.current&&importRef.current.click(), title:'Restore inventory from a previously exported .json backup'},
          React.createElement('i',{className:'ti ti-upload'}), 'Import'),
        React.createElement('input', {
          ref: importRef, type:'file', accept:'.json',
          style:{display:'none'}, onChange:importData
        }),
        React.createElement('button', {
          className:'btn sm' + (cartCount ? ' primary' : ''),
          onClick: () => cart.length ? setModal('checkout') : showToast('Add cards to your order first.')
        },
          React.createElement('i',{className:'ti ti-shopping-cart'}),
          cartCount ? `Order (${cartCount})` : 'Order'
        )
      )
    ),

    // Body
    React.createElement('div', {className:'main'},

      // Sidebar
      React.createElement('div', {className:'sidebar'},
        React.createElement('div', {className:'nav-section'}, 'Views'),
        React.createElement('div', {
          className:'nav-item' + (view==='inventory' && gameFilter==='All' ? ' active' : ''),
          onClick:()=>navClick('inventory')
        },
          React.createElement('i',{className:'ti ti-cards'}),
          React.createElement('span',{className:'nav-item-label'},'All cards'),
          React.createElement('span',{className:'nav-count'}, totalCards)
        ),
        React.createElement('div', {
          className:'nav-item' + (view==='orders' ? ' active' : ''),
          onClick:()=>setView('orders')
        },
          React.createElement('i',{className:'ti ti-receipt'}),
          React.createElement('span',{className:'nav-item-label'},'Order history'),
          orders.length ? React.createElement('span',{className:'nav-count'}, orders.length) : null
        ),
        React.createElement('div', {
          className:'nav-item' + (view==='stats' ? ' active' : ''),
          onClick:()=>setView('stats')
        },
          React.createElement('i',{className:'ti ti-chart-bar'}),
          React.createElement('span',{className:'nav-item-label'},'Stats')
        ),

        React.createElement('div',{className:'divider', style:{margin:'8px 0'}}),
        React.createElement('div',{className:'nav-section'},'By game'),

        ...Object.entries(gameGroups).map(([game, info]) =>
          React.createElement('div', {key:game},
            React.createElement('div', {
              className:'nav-item' + (view==='inventory' && gameFilter===game ? ' active' : ''),
              onClick:()=>navClick('inventory', game, 'All')
            },
              React.createElement('i',{className:'ti ti-tag'}),
              React.createElement('span',{className:'nav-item-label', title:game},
                game.length > 17 ? game.slice(0,16)+'…' : game),
              React.createElement('span',{className:'nav-count'}, info.total)
            ),
            // Sets under the active game
            view==='inventory' && gameFilter===game &&
            Object.entries(info.sets).map(([set, cnt]) =>
              React.createElement('div', {
                key:set,
                className:'nav-item nav-sub' + (setFilter===set ? ' active' : ''),
                onClick:()=>setSetFilter(set)
              },
                React.createElement('span',{className:'nav-item-label', title:set},
                  set.length > 19 ? set.slice(0,18)+'…' : set),
                React.createElement('span',{className:'nav-count'}, cnt)
              )
            )
          )
        )
      ),

      // Main content area
      React.createElement('div', {className:'content'},
        view==='inventory' && React.createElement(InventoryView, {
          filtered, gameFilter, setFilter, setSetFilter,
          loadingPrices, refreshPrice, adjustQty, cartAdd,
          openEdit, deleteCard, cart, inv, hl, GAME_KEY
        }),
        view==='orders'    && React.createElement(OrdersView, {orders}),
        view==='stats'     && React.createElement(StatsView, {
          inv, orders, totalCards, portfolioValue, totalSales, GAME_KEY, GAME_DOT
        })
      )
    ),

    // Add / Edit modal
    (modal==='add'||modal==='edit') && React.createElement('div', {className:'overlay', onClick:()=>setModal(null)},
      React.createElement('div', {className:'modal', onClick:e=>e.stopPropagation()},
        React.createElement('div',{className:'modal-title'}, modal==='edit' ? 'Edit card' : 'Add card'),
        React.createElement('div',{className:'form-row'},
          React.createElement('label',null,'Card name'),
          React.createElement('input',{type:'text',value:form.name,onChange:fset('name'),placeholder:'e.g. Charizard ex'})
        ),
        React.createElement('div',{className:'form-row'},
          React.createElement('label',null,'Game'),
          React.createElement('select',{value:form.game,onChange:fset('game')},
            GAMES.map(g=>React.createElement('option',{key:g,value:g},g)))
        ),
        React.createElement('div',{className:'form-row'},
          React.createElement('label',null,'Set name'),
          React.createElement('input',{type:'text',value:form.set,onChange:fset('set'),placeholder:'e.g. Scarlet & Violet 151'})
        ),
        React.createElement('div',{className:'form-row-split'},
          React.createElement('div',{className:'form-row'},
            React.createElement('label',null,'Card number'),
            React.createElement('input',{type:'text',value:form.number,onChange:fset('number'),placeholder:'006/165'})
          ),
          React.createElement('div',{className:'form-row'},
            React.createElement('label',null,'Qty'),
            React.createElement('input',{type:'number',min:0,value:form.qty,onChange:fset('qty')})
          )
        ),
        React.createElement('div',{className:'form-row'},
          React.createElement('label',null,'Condition'),
          React.createElement('select',{value:form.condition,onChange:fset('condition')},
            CONDITIONS.map(c=>React.createElement('option',{key:c,value:c},c)))
        ),
        React.createElement('div',{className:'form-actions'},
          React.createElement('button',{className:'btn',onClick:()=>setModal(null)},'Cancel'),
          React.createElement('button',{
            className:'btn primary',
            onClick:saveCard,
            disabled:!form.name.trim()||!form.set.trim()
          }, modal==='edit' ? 'Save changes' : 'Add card')
        )
      )
    ),

    // Checkout modal
    modal==='checkout' && React.createElement('div',{className:'overlay',onClick:()=>setModal(null)},
      React.createElement('div',{className:'modal',style:{width:400},onClick:e=>e.stopPropagation()},
        React.createElement('div',{className:'modal-title'},'Review order'),
        cart.map(item => {
          const card = inv.find(c=>c.id===item.cardId);
          if(!card) return null;
          return React.createElement('div',{key:item.cardId,className:'checkout-row'},
            React.createElement('div',{style:{flex:1}},
              React.createElement('div',{className:'checkout-name'},card.name),
              React.createElement('div',{className:'checkout-set'},card.set)
            ),
            React.createElement('div',{className:'checkout-qty-ctrl'},
              React.createElement('button',{className:'qty-btn',style:{width:20,height:20,fontSize:13},onClick:()=>cartAdjust(item.cardId,-1)},'−'),
              React.createElement('span',{style:{fontSize:13,minWidth:18,textAlign:'center',fontFamily:'var(--mono)'}},item.qty),
              React.createElement('button',{className:'qty-btn',style:{width:20,height:20,fontSize:13},onClick:()=>cartAdjust(item.cardId,+1)},'+')
            ),
            React.createElement('span',{className:'checkout-price'},
              card.price ? '$'+(card.price*item.qty).toFixed(2) : '—'),
            React.createElement('button',{className:'btn icon sm',onClick:()=>cartRemove(item.cardId)},
              React.createElement('i',{className:'ti ti-x',style:{fontSize:12}}))
          );
        }),
        React.createElement('div',{className:'checkout-total'},
          React.createElement('span',{className:'checkout-total-label'},'Order total'),
          React.createElement('span',{className:'checkout-total-val'},'$'+cartTotal.toFixed(2))
        ),
        React.createElement('div',{className:'checkout-note'},
          'Completing this order will deduct quantities from your inventory.'),
        React.createElement('div',{className:'form-actions'},
          React.createElement('button',{className:'btn',onClick:()=>setModal(null)},'Back'),
          React.createElement('button',{className:'btn primary',onClick:checkout},
            React.createElement('i',{className:'ti ti-check'}),'Complete order')
        )
      )
    ),

    // API Key modal
    showKeyModal && React.createElement('div',{className:'overlay',onClick:()=>setShowKeyModal(false)},
      React.createElement(ApiKeyModal,{
        currentKey:apiKey, onSave:saveApiKey,
        onClose:()=>setShowKeyModal(false)
      })
    ),

    // Toast notification
    toast && React.createElement('div',{className:'toast'}, toast)
  );
}

// ═══════════════════════════════════════════════════════════
//  API KEY MODAL
// ═══════════════════════════════════════════════════════════
function ApiKeyModal({currentKey, onSave, onClose}) {
  const [val, setVal] = React.useState(currentKey || '');
  return React.createElement('div',{className:'overlay',onClick:onClose},
    React.createElement('div',{className:'modal',style:{width:400},onClick:e=>e.stopPropagation()},
      React.createElement('div',{className:'modal-title'},
        React.createElement('i',{className:'ti ti-key',style:{marginRight:8}}),
        'TCG API key'
      ),
      React.createElement('div',{style:{fontSize:13,color:'var(--text-muted)',marginBottom:16,lineHeight:1.6}},
        'Prices are fetched from ',
        React.createElement('a',{href:'https://tcgapi.dev',target:'_blank',style:{color:'var(--accent-text)'},onClick:e=>e.stopPropagation()},'tcgapi.dev'),
        ' — a free pricing API for trading cards. The free tier gives you 100 price lookups per day with no credit card required.',
        React.createElement('br'),React.createElement('br'),
        'To get your free key:',
        React.createElement('ol',{style:{margin:'8px 0 0 16px',display:'flex',flexDirection:'column',gap:4}},
          React.createElement('li',null,'Go to ',
            React.createElement('a',{href:'https://tcgapi.dev/signup',target:'_blank',style:{color:'var(--accent-text)'},onClick:e=>e.stopPropagation()},'tcgapi.dev/signup')),
          React.createElement('li',null,'Create a free account (email + password, no card required)'),
          React.createElement('li',null,'Copy your API key from the dashboard'),
          React.createElement('li',null,'Paste it below and click Save')
        )
      ),
      React.createElement('div',{className:'form-row'},
        React.createElement('label',null,'Your API key'),
        React.createElement('input',{
          type:'text',
          value:val,
          onChange:e=>setVal(e.target.value),
          placeholder:'e.g. tcgapi_xxxxxxxxxxxxxxxx',
          style:{fontFamily:'var(--mono)',fontSize:12}
        })
      ),
      currentKey && React.createElement('div',{
        style:{fontSize:11,color:'var(--text-dim)',marginTop:-6,marginBottom:10}
      },'Key ending in …' + currentKey.slice(-6) + ' is currently active.'),
      React.createElement('div',{className:'form-actions'},
        currentKey && React.createElement('button',{
          className:'btn danger',style:{marginRight:'auto'},
          onClick:()=>onSave('')
        },'Remove key'),
        React.createElement('button',{className:'btn',onClick:onClose},'Cancel'),
        React.createElement('button',{
          className:'btn primary',
          onClick:()=>onSave(val),
          disabled:!val.trim() && !currentKey
        },'Save key')
      )
    )
  );
}

// ═══════════════════════════════════════════════════════════
//  INVENTORY VIEW
// ═══════════════════════════════════════════════════════════
function InventoryView({filtered, gameFilter, setFilter, setSetFilter, loadingPrices, refreshPrice, adjustQty, cartAdd, openEdit, deleteCard, cart, inv, hl, GAME_KEY}) {
  const title = gameFilter==='All' ? 'All cards'
    : setFilter==='All' ? gameFilter
    : `${gameFilter} — ${setFilter}`;

  return React.createElement('div',null,
    React.createElement('div',{className:'section-head'},
      React.createElement('div',null,
        React.createElement('div',{className:'section-title'}, title),
        React.createElement('div',{className:'section-sub'},
          `${filtered.length} card type${filtered.length!==1?'s':''}, ${filtered.reduce((s,c)=>s+c.qty,0)} total in stock`)
      )
    ),
    filtered.length===0
      ? React.createElement('div',{className:'empty'},
          React.createElement('i',{className:'ti ti-cards'}),
          React.createElement('p',null,'No cards match. Try adjusting your filters or search.'))
      : React.createElement('div',{className:'cards-grid'},
          filtered.map(card =>
            React.createElement(CardTile,{
              key:card.id, card, loadingPrices, refreshPrice,
              adjustQty, cartAdd, openEdit, deleteCard, cart, hl, GAME_KEY
            })
          )
        )
  );
}

// ═══════════════════════════════════════════════════════════
//  CARD TILE
// ═══════════════════════════════════════════════════════════
function CardTile({card, loadingPrices, refreshPrice, adjustQty, cartAdd, openEdit, deleteCard, cart, hl, GAME_KEY}) {
  const inCart   = cart.find(i => i.cardId === card.id);
  const isLoading= loadingPrices[card.id];
  const gk       = GAME_KEY[card.game] || 'other';
  const ageStr   = card.priceTs
    ? (()=>{const m=Math.floor((Date.now()-card.priceTs)/60000); return m<60?`${m}m ago`:m<1440?`${Math.floor(m/60)}h ago`:`${Math.floor(m/1440)}d ago`;})()
    : null;

  return React.createElement('div',{className:'card-tile'+(inCart?' in-cart':'')},
    React.createElement('div',{className:`card-stripe stripe-${gk}`}),
    React.createElement('div',{className:'card-body'},

      // Name + action buttons
      React.createElement('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:4,marginBottom:3}},
        React.createElement('div',{className:'card-name'}, hl(card.name)),
        React.createElement('div',{style:{display:'flex',gap:3,flexShrink:0}},
          React.createElement('button',{className:'btn icon sm',title:'Edit card',onClick:e=>openEdit(card,e)},
            React.createElement('i',{className:'ti ti-edit',style:{fontSize:12}})),
          React.createElement('button',{className:'btn icon sm',title:'Delete card',onClick:e=>deleteCard(card.id,e)},
            React.createElement('i',{className:'ti ti-trash',style:{fontSize:12}}))
        )
      ),

      // Set name
      React.createElement('div',{className:'card-set'}, hl(card.set)),

      // Badges
      React.createElement('div',{className:'card-badges'},
        React.createElement('span',{className:`badge badge-${gk}`}, card.game),
        React.createElement('span',{className:'badge badge-cond'}, card.condition),
        card.number && React.createElement('span',{className:'badge badge-num'}, hl(card.number))
      ),

      // Divider + price + qty
      React.createElement('div',{className:'card-bottom'},

        // Price row
        React.createElement('div',{className:'card-price-row'},
          isLoading
            ? React.createElement('span',{className:'card-price loading'},'Fetching price…')
            : card.price !== null
              ? React.createElement('div',null,
                  React.createElement('div',{className:'card-price'},'$'+card.price.toFixed(2)),
                  ageStr && React.createElement('div',{className:'price-ts'},`Updated ${ageStr}`)
                )
              : React.createElement('span',{className:'card-price no-price'},'No price yet'),
          card.price !== null && React.createElement('button',{
            className:'btn sm' + (inCart?' primary':''),
            onClick:()=>cartAdd(card),
            disabled:card.qty===0
          }, inCart ? `In order (${inCart.qty})` : 'Add to order')
        ),

        // Get/refresh price button (when no price or want refresh)
        React.createElement('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginTop:6}},
          // Qty controls
          React.createElement('div',{className:'qty-row'},
            React.createElement('button',{className:'qty-btn',onClick:()=>adjustQty(card.id,-1)},'−'),
            React.createElement('span',{className:'qty-val'}, card.qty),
            React.createElement('button',{className:'qty-btn',onClick:()=>adjustQty(card.id,+1)},'+'),
            React.createElement('span',{className:'qty-label'},'in stock')
          ),
          React.createElement('button',{
            className:'btn sm',
            style:{fontSize:11,padding:'3px 7px'},
            onClick:e=>refreshPrice(card,e),
            disabled:isLoading
          },
            React.createElement('i',{className:'ti ti-refresh',style:{fontSize:11}}),
            card.price===null ? 'Get price' : '↻'
          )
        )
      )
    )
  );
}

// ═══════════════════════════════════════════════════════════
//  ORDER HISTORY VIEW
// ═══════════════════════════════════════════════════════════
function OrdersView({orders}) {
  if (!orders.length) return React.createElement('div',{className:'empty'},
    React.createElement('i',{className:'ti ti-receipt'}),
    React.createElement('p',null,'No orders yet. Complete a checkout to see history here.')
  );

  return React.createElement('div',null,
    React.createElement('div',{className:'section-head'},
      React.createElement('div',null,
        React.createElement('div',{className:'section-title'},'Order history'),
        React.createElement('div',{className:'section-sub'},`${orders.length} order${orders.length!==1?'s':''}`)
      )
    ),
    React.createElement('div',{className:'orders-list'},
      orders.map(order =>
        React.createElement('div',{key:order.id,className:'order-card'},
          React.createElement('div',{className:'order-header'},
            React.createElement('span',{className:'order-id'}, order.id),
            React.createElement('span',{className:'order-date'}, new Date(order.date).toLocaleString())
          ),
          React.createElement('div',{className:'order-items'},
            order.items.map((item,i) =>
              React.createElement('div',{key:i,className:'order-row'},
                React.createElement('div',{style:{flex:1}},
                  React.createElement('div',{className:'order-name'}, item.name),
                  React.createElement('div',{className:'order-meta'}, `${item.set} · ${item.game}`)
                ),
                React.createElement('span',{className:'order-qty'}, `×${item.qty}`),
                React.createElement('span',{className:'order-line-price'},
                  '$'+(item.price*item.qty).toFixed(2))
              )
            )
          ),
          React.createElement('div',{className:'order-total-row'},
            React.createElement('span',{className:'order-total-label'},'Order total'),
            React.createElement('span',{className:'order-total-val'},'$'+order.total.toFixed(2))
          )
        )
      )
    )
  );
}

// ═══════════════════════════════════════════════════════════
//  STATS VIEW
// ═══════════════════════════════════════════════════════════
function StatsView({inv, orders, totalCards, portfolioValue, totalSales, GAME_KEY, GAME_DOT}) {
  const byGame = {};
  inv.forEach(c => {
    if (!byGame[c.game]) byGame[c.game] = {qty:0, value:0, types:0};
    byGame[c.game].qty   += c.qty;
    byGame[c.game].value += (c.price||0) * c.qty;
    byGame[c.game].types += 1;
  });

  const pricedCount = inv.filter(c=>c.price!==null).length;

  return React.createElement('div',null,
    React.createElement('div',{className:'section-title',style:{marginBottom:14}},'Overview'),
    React.createElement('div',{className:'stats-grid'},
      React.createElement('div',{className:'stat-card'},
        React.createElement('div',{className:'stat-label'},'Total cards in stock'),
        React.createElement('div',{className:'stat-val'},totalCards)),
      React.createElement('div',{className:'stat-card'},
        React.createElement('div',{className:'stat-label'},'Unique listings'),
        React.createElement('div',{className:'stat-val'},inv.length)),
      React.createElement('div',{className:'stat-card'},
        React.createElement('div',{className:'stat-label'},'Portfolio value'),
        React.createElement('div',{className:'stat-val amber'},'$'+portfolioValue.toFixed(2))),
      React.createElement('div',{className:'stat-card'},
        React.createElement('div',{className:'stat-label'},'Total sales'),
        React.createElement('div',{className:'stat-val green'},'$'+totalSales.toFixed(2))),
      React.createElement('div',{className:'stat-card'},
        React.createElement('div',{className:'stat-label'},'Orders completed'),
        React.createElement('div',{className:'stat-val'},orders.length)),
      React.createElement('div',{className:'stat-card'},
        React.createElement('div',{className:'stat-label'},'Cards priced'),
        React.createElement('div',{className:'stat-val'},`${pricedCount}/${inv.length}`))
    ),
    React.createElement('div',{className:'section-title',style:{marginBottom:12}},'By game'),
    Object.entries(byGame).map(([game, info]) =>
      React.createElement('div',{key:game,className:'game-stat-row'},
        React.createElement('div',{className:'game-dot',style:{background:GAME_DOT[game]||'#888'}}),
        React.createElement('span',{className:'game-stat-name'},game),
        React.createElement('span',{className:'game-stat-qty'},`${info.types} type${info.types!==1?'s':''} · ${info.qty} cards`),
        info.value>0&&React.createElement('span',{className:'game-stat-val'},'$'+info.value.toFixed(2))
      )
    )
  );
}

// ═══════════════════════════════════════════════════════════
//  MOUNT
// ═══════════════════════════════════════════════════════════
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
